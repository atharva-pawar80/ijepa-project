<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How I-JEPA Works — Interactive Walkthrough</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F3F6FA;
    --grid-line: #D7E3F0;
    --ink: #1B2430;
    --ink-soft: #4A5568;
    --coral: #E8664A;
    --coral-soft: #F3A492;
    --blue: #3B7DD8;
    --blue-soft: #9DBFEC;
    --gray: #B8C4D3;
    --paper: #FFFFFF;
    --border: #C9D6E5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
  }

  .wrap { max-width: 920px; margin: 0 auto; padding: 48px 24px 80px; }

  .back-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: none;
    display: inline-block;
    margin-bottom: 24px;
  }
  .back-link:hover { color: var(--blue); }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--coral);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 4.5vw, 44px);
    line-height: 1.1;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 600px;
    margin: 0 0 40px;
  }

  /* --- Stepper --- */
  .stepper {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .step-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    color: var(--ink-soft);
    transition: all 0.2s;
    background: var(--paper);
  }
  .step-btn.active .step-num {
    background: var(--coral);
    border-color: var(--coral);
    color: white;
  }
  .step-btn.active { color: var(--ink); }
  .step-btn.done .step-num { border-color: var(--blue); color: var(--blue); }
  .step-connector {
    width: 20px;
    height: 1px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* --- Stage panel --- */
  .stage-panel {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    margin-top: 16px;
  }

  .stage-header { margin-bottom: 24px; }
  .stage-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 8px;
  }
  .stage-desc {
    font-size: 14.5px;
    color: var(--ink-soft);
    max-width: 620px;
    margin: 0;
  }
  .stage-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--coral);
    margin-top: 10px;
  }

  .viz-area {
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 0;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .nav-btns { display: flex; gap: 10px; }
  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 9px 16px;
    border-radius: 3px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
  }
  .btn.secondary { background: transparent; color: var(--ink); border-color: var(--border); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn:hover:not(:disabled) { opacity: 0.8; }

  /* --- Grid / patch visuals (shared across stages) --- */
  .patch-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
    width: 224px;
    height: 224px;
    flex-shrink: 0;
  }
  .patch {
    background: var(--gray);
    border-radius: 1px;
    opacity: 0.35;
    transition: all 0.5s ease;
  }
  .patch.context { background: var(--blue); opacity: 0.75; }
  .patch.target-0 { background: var(--coral); opacity: 0.85; }
  .patch.target-1 { background: var(--coral); opacity: 0.65; }
  .patch.target-2 { background: var(--coral); opacity: 0.95; }
  .patch.target-3 { background: var(--coral); opacity: 0.5; }
  .patch.dim { opacity: 0.12; }

  .flow-row { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; justify-content: center; }
  .arrow-icon { font-size: 22px; color: var(--ink-soft); flex-shrink: 0; }

  .token-stack { display: flex; flex-direction: column; gap: 6px; }
  .token {
    width: 90px;
    height: 14px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--blue), var(--blue-soft));
    opacity: 0;
    transform: translateX(-8px);
    animation: tokenIn 0.4s ease forwards;
  }
  .token.target-tok { background: linear-gradient(90deg, var(--coral), var(--coral-soft)); }
  .token.dim-tok { background: var(--gray); opacity: 0.3 !important; animation: none; transform: none; }
  .token.mask-tok {
    background: var(--paper);
    border: 1.5px dashed var(--coral);
    display: flex; align-items: center; justify-content: center;
    color: var(--coral); font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500;
  }
  @keyframes tokenIn { to { opacity: 1; transform: translateX(0); } }

  .box-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 8px;
  }

  .predictor-box {
    width: 100px;
    height: 130px;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    padding: 8px;
    background: repeating-linear-gradient(135deg, var(--paper), var(--paper) 6px, #F7FAFD 6px, #F7FAFD 12px);
  }

  .loss-compare { display: flex; align-items: center; gap: 20px; }
  .loss-pair { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .loss-line {
    width: 40px;
    height: 1px;
    border-top: 1.5px dashed var(--ink-soft);
    position: relative;
  }
  .loss-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
  }

  @media (prefers-reduced-motion: reduce) {
    .token { animation: none; opacity: 1; transform: none; }
    .patch { transition: none; }
  }

  @media (max-width: 640px) {
    .patch-grid { width: 168px; height: 168px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <a class="back-link" href="index.html">← back to project overview</a>
  <div class="eyebrow">Interactive walkthrough</div>
  <h1>How I-JEPA actually works.</h1>
  <p class="subtitle">
    Six stages, click through each one. This is the exact pipeline running
    underneath the live demo — not a simplified cartoon version.
  </p>

  <div class="stepper" id="stepper"></div>

  <div class="stage-panel">
    <div class="stage-header">
      <h2 class="stage-title" id="stageTitle"></h2>
      <p class="stage-desc" id="stageDesc"></p>
      <div class="stage-note" id="stageNote"></div>
    </div>
    <div class="viz-area" id="vizArea"></div>
    <div class="controls">
      <div class="nav-btns">
        <button class="btn secondary" id="prevBtn">← Prev</button>
        <button class="btn secondary" id="nextBtn">Next →</button>
      </div>
      <button class="btn" id="playBtn">▶ Auto-play</button>
    </div>
  </div>
</div>

<script>
(function () {
  // 8x8 grid for clarity. Target blocks are fixed positions (not random)
  // so the explanation stays consistent every time someone visits.
  const GRID = 8;
  const TOTAL = GRID * GRID;

  // Fixed example layout: 4 target blocks + a context block with those
  // regions removed -- mirrors masking.py's actual algorithm, just with
  // a hand-picked example instead of a random draw, for a stable teaching aid.
  const targetBlocks = [
    { cls: 'target-0', cells: range(1,1,3,3) },   // top-left-ish
    { cls: 'target-1', cells: range(1,5,3,2) },   // top-right-ish
    { cls: 'target-2', cells: range(5,1,2,3) },   // bottom-left-ish
    { cls: 'target-3', cells: range(4,5,3,3) },   // bottom-right-ish
  ];
  function range(row, col, h, w) {
    const out = [];
    for (let r = row; r < row + h && r < GRID; r++)
      for (let c = col; c < col + w && c < GRID; c++)
        out.push(r * GRID + c);
    return out;
  }
  const targetCellSet = new Set(targetBlocks.flatMap(b => b.cells));
  const contextCells = [...Array(TOTAL).keys()].filter(i => !targetCellSet.has(i));

  function makeGrid(highlightFn) {
    const grid = document.createElement('div');
    grid.className = 'patch-grid';
    for (let i = 0; i < TOTAL; i++) {
      const cell = document.createElement('div');
      cell.className = 'patch ' + (highlightFn(i) || '');
      grid.appendChild(cell);
    }
    return grid;
  }

  function makeTokenStack(count, cls, delayStart) {
    const stack = document.createElement('div');
    stack.className = 'token-stack';
    for (let i = 0; i < count; i++) {
      const t = document.createElement('div');
      t.className = 'token ' + (cls || '');
      t.style.animationDelay = ((delayStart || 0) + i * 0.05) + 's';
      stack.appendChild(t);
    }
    return stack;
  }

  function labeled(el, text) {
    const wrap = document.createElement('div');
    wrap.style.display = 'flex';
    wrap.style.flexDirection = 'column';
    wrap.style.alignItems = 'center';
    wrap.appendChild(el);
    const label = document.createElement('div');
    label.className = 'box-label';
    label.textContent = text;
    wrap.appendChild(label);
    return wrap;
  }

  function arrow() {
    const a = document.createElement('div');
    a.className = 'arrow-icon';
    a.textContent = '→';
    return a;
  }

  const stages = [
    {
      title: '1. Start with an image',
      desc: 'Any image gets split into a grid of patches -- 8×8 here for clarity (the real model uses a finer grid). Nothing is hidden yet.',
      note: '',
      render: () => {
        const grid = makeGrid(() => '');
        return labeled(grid, 'input image, as patches');
      }
    },
    {
      title: '2. Multi-block masking',
      desc: 'A context block (blue) is sampled, then 4 target blocks (coral) are sampled independently. Any overlap is cut out of the context -- so the model can\'t cheat by copying nearby pixels.',
      note: 'scale: context 0.85–1.0 · targets 0.15–0.2 each',
      render: () => {
        const grid = makePatchGrid(i => {
          if (targetCellSet.has(i)) {
            const block = targetBlocks.find(b => b.cells.includes(i));
            return block.cls;
          }
          return 'context';
        });
        return labeled(grid, 'context (blue) + 4 target blocks (coral)');
      }
    },
    {
      title: '3. Context encoder',
      desc: 'Only the visible context patches are processed by the context encoder (a Vision Transformer). The target regions are never shown to it at this stage.',
      note: 'this is the ONLY network trained by gradient descent',
      render: () => {
        const row = document.createElement('div');
        row.className = 'flow-row';
        const grid = makePatchGrid(i => targetCellSet.has(i) ? 'dim' : 'context');
        row.appendChild(labeled(grid, 'visible context patches'));
        row.appendChild(arrow());
        row.appendChild(labeled(makeTokenStack(6, ''), 'context tokens'));
        return row;
      }
    },
    {
      title: '4. Target encoder (frozen, EMA)',
      desc: 'A separate copy of the encoder processes the FULL image -- including the parts the context encoder never saw. It is never updated by gradient descent, only by a slow-moving average of the context encoder\'s weights.',
      note: 'this asymmetry is what prevents the model from collapsing to a trivial answer',
      render: () => {
        const row = document.createElement('div');
        row.className = 'flow-row';
        const grid = makeGrid(() => '');
        row.appendChild(labeled(grid, 'full image, everything visible'));
        row.appendChild(arrow());
        const stack = document.createElement('div');
        stack.className = 'token-stack';
        for (let i = 0; i < 8; i++) {
          const t = document.createElement('div');
          const isTarget = i < 4;
          t.className = 'token ' + (isTarget ? 'target-tok' : 'dim-tok');
          t.style.animationDelay = (i * 0.05) + 's';
          stack.appendChild(t);
        }
        row.appendChild(labeled(stack, 'only target-position tokens kept'));
        return row;
      }
    },
    {
      title: '5. Predictor',
      desc: 'A separate, narrower transformer takes the context tokens plus a learnable "mask token" for each target position (marked ?), and predicts what the target encoder would output there.',
      note: 'positional embeddings tell each mask token WHERE to predict',
      render: () => {
        const row = document.createElement('div');
        row.className = 'flow-row';
        row.appendChild(labeled(makeTokenStack(6, ''), 'context tokens'));
        const plus = document.createElement('div');
        plus.className = 'arrow-icon';
        plus.textContent = '+';
        row.appendChild(plus);
        const maskStack = document.createElement('div');
        maskStack.className = 'token-stack';
        for (let i = 0; i < 4; i++) {
          const t = document.createElement('div');
          t.className = 'token mask-tok';
          t.style.opacity = 1;
          t.textContent = '?';
          maskStack.appendChild(t);
        }
        row.appendChild(labeled(maskStack, 'mask tokens'));
        row.appendChild(arrow());
        const box = document.createElement('div');
        box.className = 'predictor-box';
        box.textContent = 'Predictor';
        row.appendChild(box);
        row.appendChild(arrow());
        row.appendChild(labeled(makeTokenStack(4, 'target-tok'), 'predicted tokens'));
        return row;
      }
    },
    {
      title: '6. Loss',
      desc: 'The predicted tokens are compared to the target encoder\'s real output at those same positions -- average squared distance, in representation space, not pixels. The predictor and context encoder learn to shrink this gap.',
      note: 'the target side is always detached -- no gradient ever flows into the target encoder here',
      render: () => {
        const row = document.createElement('div');
        row.className = 'flow-row';
        row.appendChild(labeled(makeTokenStack(4, 'target-tok'), 'predicted'));
        const compare = document.createElement('div');
        compare.style.display = 'flex';
        compare.style.flexDirection = 'column';
        compare.style.alignItems = 'center';
        compare.style.gap = '4px';
        const line = document.createElement('div');
        line.className = 'loss-line';
        const tag = document.createElement('div');
        tag.className = 'loss-tag';
        tag.textContent = 'L2 dist ↓';
        compare.appendChild(tag);
        compare.appendChild(line);
        row.appendChild(compare);
        row.appendChild(labeled(makeTokenStack(4, 'target-tok'), 'actual (frozen)'));
        return row;
      }
    },
    {
  title: '7. EMA update',
  desc: 'After every training step, the target encoder\'s weights nudge slightly toward the context encoder\'s -- never overwritten, just gently pulled.',
  note: 'momentum starts at 0.996, ramps to 1.0 over training',
  render: () => {
    const row = document.createElement('div');
    row.className = 'flow-row';
    row.appendChild(labeled(makeTokenStack(6, ''), 'context encoder weights'));
    row.appendChild(arrow());
    const tag = document.createElement('div');
        tag.className = 'loss-tag';
        tag.textContent = 'target = m·target + (1-m)·context';
    row.appendChild(tag);
    row.appendChild(labeled(makeTokenStack(6, 'target-tok'), 'target encoder weights'));
    return row;
  }
},
  ];

  let current = 0;
  let playing = false;
  let playTimer = null;

  const stepper = document.getElementById('stepper');
  const stageTitle = document.getElementById('stageTitle');
  const stageDesc = document.getElementById('stageDesc');
  const stageNote = document.getElementById('stageNote');
  const vizArea = document.getElementById('vizArea');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const playBtn = document.getElementById('playBtn');

  function buildStepper() {
    stepper.innerHTML = '';
    stages.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'step-btn';
      btn.innerHTML = `<span class="step-num">${i + 1}</span>`;
      btn.addEventListener('click', () => { stopPlaying(); goTo(i); });
      stepper.appendChild(btn);
      if (i < stages.length - 1) {
        const conn = document.createElement('div');
        conn.className = 'step-connector';
        stepper.appendChild(conn);
      }
    });
  }

  function render() {
    const stage = stages[current];
    stageTitle.textContent = stage.title;
    stageDesc.textContent = stage.desc;
    stageNote.textContent = stage.note;
    vizArea.innerHTML = '';
    vizArea.appendChild(stage.render());

    [...stepper.querySelectorAll('.step-btn')].forEach((btn, i) => {
      btn.classList.toggle('active', i === current);
      btn.classList.toggle('done', i < current);
    });

    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === stages.length - 1;
  }

  function goTo(i) {
    current = Math.max(0, Math.min(stages.length - 1, i));
    render();
  }

  function stopPlaying() {
    playing = false;
    playBtn.textContent = '▶ Auto-play';
    if (playTimer) clearInterval(playTimer);
  }

  playBtn.addEventListener('click', () => {
    if (playing) { stopPlaying(); return; }
    playing = true;
    playBtn.textContent = '⏸ Pause';
    if (current === stages.length - 1) goTo(0);
    playTimer = setInterval(() => {
      if (current >= stages.length - 1) { stopPlaying(); return; }
      goTo(current + 1);
    }, 3200);
  });

  prevBtn.addEventListener('click', () => { stopPlaying(); goTo(current - 1); });
  nextBtn.addEventListener('click', () => { stopPlaying(); goTo(current + 1); });

  buildStepper();
  render();
})();
</script>

</body>
</html>
